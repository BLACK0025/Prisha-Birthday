<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday My Love ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
overflow:hidden;
}

h1{
margin-top:80px;
font-size:50px;
}

p{
font-size:20px;
width:70%;
margin:auto;
line-height:1.6;
}

.slideshow{
width:260px;
height:260px;
margin:30px auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
}

button{
margin-top:20px;
padding:15px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4b7d;
cursor:pointer;
}

.heart{
position:absolute;
color:white;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-100vh);opacity:0}
}

</style>

</head>

<body>

<h1>Happy Birthday My Love 🎂</h1>

<div class="slideshow">
<img id="slide" src="photo1.jpg">
</div>

<p>
Prisha, you make my world brighter just by being in it.  
Your smile, your voice, and your presence mean more to me than words can explain.  
Today is special because the most beautiful soul I know was born.  
Happy Birthday my love ❤️
</p>

<button onclick="startMusic()">Tap for a surprise ❤️</button>

<audio id="song" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

let images=[
"photo1.jpg",
"photo2.jpg",
"photo3.jpg"
];

let index=0;

setInterval(()=>{
index=(index+1)%images.length;
document.getElementById("slide").src=images[index];
},3000);

function startMusic(){
let song=document.getElementById("song");
song.play();
alert("I love you Prisha ❤️ Happy Birthday!");
}

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+20)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},300);

</script>

</body>
</html>
