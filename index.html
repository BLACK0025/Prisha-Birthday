<!DOCTYPE html>
<html>

<head>
<title>Happy Birthday My Love ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
overflow:hidden;
}

h1{
margin-top:70px;
font-size:50px;
}

p{
font-size:20px;
width:75%;
margin:auto;
line-height:1.6;
min-height:120px;
}

.slideshow{
width:260px;
height:260px;
margin:30px auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
}

button{
margin-top:20px;
padding:15px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4b7d;
cursor:pointer;
}

.heart{
position:absolute;
color:white;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-100vh);opacity:0}
}

</style>

</head>

<body>

<h1>Happy Birthday My Love 🎂</h1>

<div class="slideshow">
<img id="slide" src="./photo1.jpg">
</div>

<p id="message"></p>

<button onclick="startMusic()">Tap for a surprise ❤️</button>

<audio id="song">
<source src="./music.mp3" type="audio/mpeg">
</audio>

<script>

/* TYPEWRITER MESSAGE */

let text="Prisha, the day you came into my life something quietly beautiful began. Like a soft melody that stays with the heart, you became the warmth in my days and the calm in my thoughts. Your smile carries a light that makes the ordinary feel magical. I hope this day surrounds you with happiness, love, and every beautiful thing your heart deserves. Happy Birthday my love ❤️";

let i=0;

function typeWriter(){
if(i<text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

typeWriter();

/* SLIDESHOW */

let images=[
"./photo1.jpg",
"./photo2.jpg",
"./photo3.jpg"
];

let index=0;

setInterval(()=>{
index=(index+1)%images.length;
document.getElementById("slide").src=images[index];
},3000);

/* MUSIC */

function startMusic(){
let song=document.getElementById("song");
song.play();
alert("I love you Prisha ❤️ Happy Birthday!");
}

/* FLOATING HEARTS */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},300);

</script>

</body>

</html>
