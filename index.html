<!DOCTYPE html>
<html>

<head>
<title>Happy Birthday My Love ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
overflow:hidden;
background:black;
}

/* starry background */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2}
to{opacity:1}
}

h1{
margin-top:60px;
font-size:50px;
}

p{
font-size:20px;
width:75%;
margin:auto;
line-height:1.6;
min-height:120px;
}

/* slideshow */

.slideshow{
width:260px;
height:260px;
margin:30px auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.slideshow img{
width:100%;
height:100%;
object-fit:cover;
}

/* envelope */

.envelope{
width:220px;
height:140px;
background:#ff758c;
margin:30px auto;
position:relative;
cursor:pointer;
}

.envelope:before{
content:"";
position:absolute;
top:-70px;
left:0;
border-left:110px solid transparent;
border-right:110px solid transparent;
border-bottom:70px solid #ff758c;
}

button{
margin-top:20px;
padding:15px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4b7d;
cursor:pointer;
}

/* hearts */

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

</style>

</head>

<body>

<h1>Happy Birthday My Love 🎂</h1>

<div class="slideshow">
<img id="slide" src="./photo1.jpeg">
</div>

<div class="envelope" onclick="openLetter()"></div>

<p id="message"></p>

<button onclick="startMusic()">Play our song ❤️</button>

<audio id="song">
<source src="./music.mp3" type="audio/mpeg">
</audio>

<script>

/* stars */

for(let i=0;i<120;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
document.body.appendChild(star);
}

/* slideshow */

let images=[
"./photo1.jpeg",
"./photo2.jpeg",
"./photo3.jpeg"
];

let text="Prisha, the day you came into my life something quietly beautiful began. Like a soft melody that stays with the heart, you became the warmth in my days and the calm in my thoughts. Your smile carries a light that makes the ordinary feel magical. Happy Birthday my love ❤️";

let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

typeWriter();
}

function typeWriter(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typeWriter,40);

}

}

/* music */

function startMusic(){

let song=document.getElementById("song");

song.play();

}

/* hearts */

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

},300);

</script>

</body>

</html>
